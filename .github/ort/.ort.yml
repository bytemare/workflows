---

excludes:
  paths:
    - pattern: ".github/CODE_OF_CONDUCT.md"
      reason: "DOCUMENTATION_OF"
      comment: "Project OSS Contributor Covenant Code of Conduct. The CC-BY-SA-4.0 license applies to the CoC document text itself, not to the project source code. Not part of release artifacts."
    - pattern: "tests/test_ort_report.py"
      reason: "TEST_OF"
      comment: "Python test file for the local ORT report helper. Test-only and not part of release artifacts."
    - pattern: "tests/requirements-test.txt"
      reason: "TEST_OF"
      comment: "Pinned Python test tooling dependencies used only for repository CI tests, not release artifacts."
