name: Codecov

on:
  workflow_call:
    inputs:
      disable_search:
        description: 'Disable search for coverage files. This is helpful when specifying what files you want to upload with the files option.'
        required: false
        type: string
        default: 'true'
    secrets:
      codecov:
        required: true

permissions: {}

jobs:
  Codecov:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@002fdce3c6a235733a90a27c80493a3241e56863
        with:
          egress-policy: block
          allowed-endpoints: >
              github.com:443
              golang.org:443
              keybase.io:443
              objects.githubusercontent.com:443
              proxy.golang.org:443
              storage.googleapis.com:443
              sum.golang.org:443
              api.codecov.io:443
              cli.codecov.io:443
              ingest.codecov.io:443
              o26192.ingest.us.sentry.io:443

      - name: Init go
        uses: bytemare/actions/init-go@434519d87b02e64b384fc52e4b0aa24c246b027b

      - name: Code Coverage
        shell: bash
        run: go test -v -race -covermode=atomic -coverpkg=./... -coverprofile=coverage.out ./...

      - uses: codecov/codecov-action@78f372e97e6e2f82dc51b004c5fb646501ee30ae
        env:
          CODECOV_TOKEN: ${{ secrets.codecov }}
        with:
          files: coverage.out
          disable_search: ${{ inputs.disable_search }}
