---

name: Codecov

on:
  workflow_call:
    inputs:
      disable_search:
        description: >-
          Disable search for coverage files. This is helpful when specifying
          what files you want to upload with the files option.
        required: false
        type: string
        default: 'true'
    secrets:
      token:
        required: false

permissions: { }

jobs:
  Codecov:
    strategy:
      fail-fast: false
    runs-on: ubuntu-latest
    steps:
      - name: Ensure Codecov token is available
        env:
          token: ${{ secrets.token }}
        run: |
          if [ -z "$token" ]; then
            echo "Codecov token is required when running this job." >&2
            exit 1
          fi

      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          egress-policy: block
          allowed-endpoints: >
              github.com:443
              golang.org:443
              keybase.io:443
              objects.githubusercontent.com:443
              proxy.golang.org:443
              storage.googleapis.com:443
              sum.golang.org:443
              api.codecov.io:443
              cli.codecov.io:443
              ingest.codecov.io:443
              o26192.ingest.us.sentry.io:443

      - name: Init go
        uses: bytemare/actions/init-go@518c7ceb95b648d85fe17330e9d46b0f54ed7a0c

      - name: Code Coverage
        shell: bash
        run: |
          go test -v -race \
            -covermode=atomic \
            -coverpkg=./... \
            -coverprofile=coverage.out \
            ./...

      - uses: codecov/codecov-action@96b38e9e60ee60a8c3911f4612407bba2f9195fb
        env:
          CODECOV_TOKEN: ${{ secrets.token }}
        with:
          files: coverage.out
          disable_search: ${{ inputs.disable_search }}
