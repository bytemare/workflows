---

name: License Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  check-licenses:
    name: Check Dependency Licenses
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          disable-sudo: true
          egress-policy: audit

      - name: Init go
        uses: bytemare/actions/init-go@4bd02bede5ae49c456c2f400521f22fc0c64456b

      - name: Install golicense
        run: |
          go install \
            github.com/google/go-licenses/v2@3e084b0caf710f7bfead967567539214f598c0a2

      - name: Run golicense
        run: |
          go-licenses check \
            --allowed_licenses="MIT,Apache-2.0,BSD-2-Clause,BSD-3-Clause" \
            ./...
