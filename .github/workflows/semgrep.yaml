---

name: Semgrep

on:
  workflow_call:
    secrets:
      semgrep:
        required: false

permissions: { }

jobs:
  Semgrep:
    permissions:
      contents: read
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    if: (github.actor != 'dependabot[bot]')
    steps:
      - name: Ensure Semgrep token is available
        env:
          token: ${{ secrets.semgrep }}
        run: |
          if [ -z "$token" ]; then
            echo "Semgrep requires SEMGREP_APP_TOKEN when enabled." >&2
            exit 1
          fi

      - name: Checkout repo
        uses: actions/checkout@71cf2267d89c5cb81562390fa70a37fa40b1305e

      - name: Run Semgrep
        run: semgrep ci --no-suppress-errors --sarif --output semgrep.sarif
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.semgrep }}

      - name: "Upload SARIF results to GitHub's code scanning dashboard"
        uses: github/codeql-action/upload-sarif@85f1517bb46a9e4d5e1ad15a6ef251b3124ba42b
        with:
          sarif_file: semgrep.sarif
