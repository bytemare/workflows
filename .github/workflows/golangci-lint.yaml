---

name: GolangCI Lint

on:
  workflow_call:
    inputs:
      config-path:
        required: false
        description: 'Path to the GolangCI-Lint configuration file'
        type: string
        default: .github/.golangci.yaml
      scope:
        required: false
        description: 'Go mod file (defaults to ./go.mod)'
        type: string
        default: ./...
      go-mod:
        required: false
        description: 'Go mod file (defaults to ./go.mod)'
        type: string
        default: ./go.mod

permissions: { }

jobs:
  GolangCI-Lint:
    name: GolangCI Lint
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@e3f713f2d8f53843e71c69a996d56f51aa9adfb9
        with:
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            go.dev:443
            golang.org:443
            golangci-lint.run:443
            hosted-compute-watchdog-prod-eus-01.githubapp.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - uses: bytemare/actions/init-go@2a5f0b2bb5525e55de59a5f62c43dc31a4dece4d
        with:
          go-mod: ${{ inputs.go-mod }}

      - uses: golangci/golangci-lint-action@2c963d3543d699fc1331bd69134fcd9f7f4efc4e
        with:
          version: latest
          args: --config=${{ inputs.config-path }} ${{ inputs.scope }}
