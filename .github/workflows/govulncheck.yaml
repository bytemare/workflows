---

name: Govulncheck

on:
  workflow_call:
    inputs:
      go-version:
        description: 'Go version used for govulncheck (overrides go-version-file)'
        required: false
        type: string
        default: ''
      go-version-file:
        description: 'Path to go.mod or go.work used to infer Go version for govulncheck'
        required: false
        type: string
        default: 'go.mod'
      go-check-latest:
        description: 'Check for the latest Go patch version matching the requested/inferred version'
        required: false
        type: boolean
        default: true
      work-dir:
        description: 'Working directory passed to govulncheck'
        required: false
        type: string
        default: '.'
      go-package:
        description: 'Go package pattern passed to govulncheck'
        required: false
        type: string
        default: './...'

permissions: { }

jobs:
  Govulncheck:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      # Needed to upload the results to code-scanning dashboard.
      security-events: write
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            golang.org:443
            hosted-compute-watchedog-prod-iad-01.githubapp.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            sum.golang.org:443
            vuln.go.dev:443

      - name: Govulncheck
        uses: golang/govulncheck-action@5accf6f1b739690f60277e881531d59debe04a22
        with:
          go-version-input: ${{ inputs['go-version'] }}
          go-version-file: ${{ inputs['go-version-file'] }}
          check-latest: ${{ inputs['go-check-latest'] }}
          work-dir: ${{ inputs['work-dir'] }}
          go-package: ${{ inputs['go-package'] }}
          output-file: govulncheck.sarif
          output-format: sarif

      - name: "Upload SARIF results to GitHub's code scanning dashboard"
        uses: github/codeql-action/upload-sarif@cb4e075f119f8bccbc942d49655b2cd4dc6e615a
        with:
          sarif_file: govulncheck.sarif
