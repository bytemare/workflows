name: "CodeQL"

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string

permissions: {}

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@a22641e386edd6104ead99416bac876f4d9b806d
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            storage.googleapis.com:443
            sum.golang.org:443
            uploads.github.com:443

      - name: Checkout repository
        uses: actions/checkout@85e6279cec87321a52edac9c87bce653a07cf6c2

      - name: Initialize CodeQL
        uses: github/codeql-action/init@8c69433c34fe91b0644d83e6f14bb77eb3e46812
        with:
          languages: ${{ inputs.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@8c69433c34fe91b0644d83e6f14bb77eb3e46812

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@8c69433c34fe91b0644d83e6f14bb77eb3e46812
