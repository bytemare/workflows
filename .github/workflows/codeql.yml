name: "CodeQL"

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string

permissions: {}

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@91182cccc01eb5e619899d80e4e971d6181294a7
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            storage.googleapis.com:443
            sum.golang.org:443
            uploads.github.com:443

      - name: Checkout repository
        uses: actions/checkout@163217dfcd28294438ea1c1c149cfaf66eec283e

      - name: Initialize CodeQL
        uses: github/codeql-action/init@63eb7bbf1f65c025536b3e7d083d89c1c161043c
        with:
          languages: ${{ inputs.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@63eb7bbf1f65c025536b3e7d083d89c1c161043c

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@63eb7bbf1f65c025536b3e7d083d89c1c161043c
