---

name: Test Go

on:
  workflow_call:
    inputs:
      version:
        description: 'The Go version to use'
        required: false
        type: string

permissions: { }

jobs:
  Test:
    runs-on: ubuntu-latest
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@95d9a5deda9de15063e7595e9719c11c38c90ae2
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            go.dev:443
            golang.org:443
            release-assets.githubusercontent.com:443

      - name: Checkout repo
        uses: actions/checkout@1af3b93b6815bc44a9784bd300feb67ff0d1eeb3
        with:
          fetch-depth: 0

      - name: Init go
        uses: bytemare/actions/init-go@796d96a57e111c29c8554df93a4815fe1e39df51
        with:
          go-version: ${{ inputs.version }}

      - name: Run Tests
        run: go test -v -race -vet=all ./...
