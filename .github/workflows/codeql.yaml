---

name: "CodeQL"

on:
  workflow_call:
    inputs:
      language:
        required: true
        type: string
      go-version:
        description: 'Go version used for CodeQL Go autobuild (overrides go-version-file)'
        required: false
        type: string
        default: ''
      go-version-file:
        description: 'Path to go.mod or go.work used to infer Go version for CodeQL Go autobuild (empty = auto-detect go.mod, then go.work)'
        required: false
        type: string
        default: ''
      go-check-latest:
        description: 'Check for the latest Go patch version matching the requested/inferred version'
        required: false
        type: boolean
        default: true

permissions: { }

jobs:
  codeql:
    name: CodeQL
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@58077d3c7e43986b6b15fba718e8ea69e387dfcc
        with:
          disable-sudo: true
          egress-policy: block
          allowed-endpoints: >
            api.github.com:443
            github.com:443
            go.dev:443
            golang.org:443
            objects.githubusercontent.com:443
            proxy.golang.org:443
            release-assets.githubusercontent.com:443
            storage.googleapis.com:443
            sum.golang.org:443
            uploads.github.com:443

      - name: Checkout repository
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98

      - name: Select Go version file for CodeQL
        id: go_version_file
        if: ${{ contains(inputs.language, 'go') && inputs['go-version'] == '' }}
        shell: bash
        env:
          INPUT_GO_VERSION_FILE: ${{ inputs['go-version-file'] }}
        run: |
          set -euo pipefail
          selected="${INPUT_GO_VERSION_FILE}"

          if [[ -z "$selected" ]]; then
            if [[ -f go.mod ]]; then
              selected="go.mod"
            elif [[ -f go.work ]]; then
              selected="go.work"
            fi
          fi

          if [[ -n "$selected" ]]; then
            echo "Using Go version file: $selected"
          else
            echo "No go.mod or go.work found at repository root; using runner default Go toolchain."
          fi

          echo "path=$selected" >> "$GITHUB_OUTPUT"

      - name: Setup Go (explicit version)
        if: ${{ contains(inputs.language, 'go') && inputs['go-version'] != '' }}
        uses: actions/setup-go@27fdb267c15a8835f1ead03dfa07f89be2bb741a
        with:
          go-version: ${{ inputs['go-version'] }}
          check-latest: ${{ inputs['go-check-latest'] }}

      - name: Setup Go (version file)
        if: ${{ contains(inputs.language, 'go') && inputs['go-version'] == '' && steps.go_version_file.outputs.path != '' }}
        uses: actions/setup-go@27fdb267c15a8835f1ead03dfa07f89be2bb741a
        with:
          go-version-file: ${{ steps.go_version_file.outputs.path }}
          check-latest: ${{ inputs['go-check-latest'] }}

      - name: Initialize CodeQL
        uses: github/codeql-action/init@7dd76e6bf79d24133aa649887a6ee01d8b063816
        with:
          languages: ${{ inputs.language }}

      - name: Autobuild
        uses: github/codeql-action/autobuild@7dd76e6bf79d24133aa649887a6ee01d8b063816

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@7dd76e6bf79d24133aa649887a6ee01d8b063816
